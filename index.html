<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>干支転生 UI</title>

<style>
:root{
  --bg:#F5F6F8;
  --panel:#FFFFFF;
  --accent:#4A90E2;
  --danger:#E94E4E;
  --text:#222;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* タブ */
.tabs{
  display:flex;
  background:#fff;
  border-bottom:1px solid #ddd;
}
.tab{
  flex:1;
  padding:10px;
  text-align:center;
  cursor:pointer;
}
.tab.active{
  background:var(--accent);
  color:#fff;
}

/* 画面 */
.screen{
  display:none;
  padding:10px;
}
.screen.active{
  display:block;
}

/* 上部UI */
.top{
  background:var(--panel);
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
.bar{
  height:14px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin:5px 0;
}
.fill{
  height:100%;
  background:var(--accent);
}
.fill.hp{background:#4CAF50;}
.fill.boss{background:#E94E4E;}

.stats{
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

/* 戦闘エリア */
.battle{
  height:250px;
  background:#fff;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* ダメージ */
.dmg{
  position:absolute;
  font-weight:bold;
  animation:pop 0.6s ease-out forwards;
}
@keyframes pop{
  0%{opacity:1;transform:translateY(0);}
  100%{opacity:0;transform:translateY(-40px);}
}

/* 下部操作 */
.controls{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}
.btn{
  flex:1;
  margin:5px;
  padding:15px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:16px;
}
.btn.dodge{background:#666;}
.btn:active{transform:scale(0.95);}

/* 右側情報（簡易） */
.side{
  margin-top:10px;
  font-size:12px;
  background:#fff;
  padding:10px;
  border-radius:10px;
}

/* カード */
.card{
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- タブ -->
<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">戦闘</div>
  <div class="tab" onclick="switchTab(1)">ビルド</div>
  <div class="tab" onclick="switchTab(2)">転生</div>
  <div class="tab" onclick="switchTab(3)">装備</div>
</div>

<!-- 戦闘 -->
<div class="screen active">

  <div class="top">
    <div>HP</div>
    <div class="bar"><div id="hp" class="fill hp" style="width:80%"></div></div>

    <div>BOSS</div>
    <div class="bar"><div id="boss" class="fill boss" style="width:100%"></div></div>

    <div class="stats">
      <div>COMBO ×<span id="combo">0</span></div>
      <div>TOTAL ×<span id="multi">1.0</span></div>
    </div>
  </div>

  <div class="battle" id="battle">
    戦闘エリア
  </div>

  <div class="controls">
    <button class="btn dodge" onclick="dodge()">回避</button>
    <button class="btn" onclick="skill()">スキル</button>
  </div>

  <div class="side">
    干支×2.0<br>
    装備×1.5<br>
    条件×3.2
  </div>

</div>

<!-- ビルド -->
<div class="screen">
  <div class="card">
    <h3>現在の干支：ネズミ</h3>
    分身型ビルド
  </div>
</div>

<!-- 転生 -->
<div class="screen">
  <div class="card">
    転生回数：10<br>
    総合倍率：×1.5
  </div>
</div>

<!-- 装備 -->
<div class="screen">
  <div class="card">
    装備一覧（仮）
  </div>
</div>

<script>
let combo = 0;

/* タブ切り替え */
function switchTab(i){
  document.querySelectorAll('.tab').forEach((t,idx)=>{
    t.classList.toggle('active', idx===i);
  });
  document.querySelectorAll('.screen').forEach((s,idx)=>{
    s.classList.toggle('active', idx===i);
  });
}

/* ダメージ表示 */
function spawnDmg(text, color="black"){
  const el = document.createElement("div");
  el.className = "dmg";
  el.innerText = text;
  el.style.color = color;
  el.style.left = Math.random()*80 + "%";
  el.style.top = "50%";
  document.getElementById("battle").appendChild(el);
  setTimeout(()=>el.remove(),600);
}

/* 攻撃（オート代わり） */
setInterval(()=>{
  combo++;
  document.getElementById("combo").innerText = combo;
  spawnDmg(Math.floor(Math.random()*1000), "black");
}, 800);

/* 回避 */
function dodge(){
  spawnDmg("回避!", "blue");
}

/* スキル */
function skill(){
  spawnDmg("CRIT!", "red");
}
</script>

</body>
</html>
