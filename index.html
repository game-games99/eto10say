<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>干支転生 改良版</title>

<style>
body{margin:0;font-family:sans-serif;background:#F5F6F8;}

.top{background:#fff;padding:10px}
.bar{height:14px;background:#ddd;border-radius:10px;overflow:hidden;margin:4px 0}
.fill{height:100%}
.hp{background:#4CAF50}
.boss{background:#E94E4E}
.exp{background:#4A90E2}

.battle{
  height:250px;background:#fff;margin:10px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}

.warning{
  position:absolute;width:100%;height:100%;
  background:rgba(255,0,0,0.2);
}

.dmg{
  position:absolute;font-weight:bold;
  animation:pop .6s forwards;
}
@keyframes pop{
  to{opacity:0;transform:translateY(-40px)}
}

.controls{display:flex}
.btn{flex:1;margin:5px;padding:15px;border:none;border-radius:10px;color:#fff}
.dodge{background:#666}
.skill{background:#4A90E2}

.card{background:#fff;margin:10px;padding:10px;border-radius:10px}
.big{font-size:20px;font-weight:bold}
</style>
</head>

<body>

<div class="top">
HP <span id="hpText"></span>
<div class="bar"><div id="hp" class="fill hp"></div></div>

BOSS <span id="bossText"></span>
<div class="bar"><div id="boss" class="fill boss"></div></div>

LV <span id="lv"></span>
<div class="bar"><div id="exp" class="fill exp"></div></div>

<div class="big">COMBO ×<span id="combo">0</span></div>
</div>

<div class="battle" id="battle"></div>

<div class="controls">
<button class="btn dodge" onclick="dodge()">回避</button>
<button class="btn skill" onclick="skill()">スキル</button>
</div>

<div class="card" id="build"></div>

<script>

// ===== 状態 =====
let player={
  atk:50,
  hp:500,
  maxHp:500,
  combo:0,
  level:1,
  exp:0,
  eto:"tiger"
};

let enemyHP=1000;
let incoming=false;
let skillCD=0;

// ===== ダメージ表示 =====
function dmg(t,c="black"){
  let e=document.createElement("div");
  e.className="dmg";
  e.innerText=t;
  e.style.color=c;
  e.style.left=Math.random()*80+"%";
  e.style.top="50%";
  battle.appendChild(e);
  setTimeout(()=>e.remove(),600);
}

// ===== 計算 =====
function calc(){
  let mult=1+(1-player.hp/player.maxHp)*2; // トラ
  mult*=1+player.combo*0.02;
  return Math.floor(player.atk*mult);
}

// ===== 攻撃ループ =====
setInterval(()=>{

  let d=calc();
  enemyHP-=d;
  player.combo++;

  dmg(d);

  if(enemyHP<=0){
    enemyHP=1000;
    gainExp(50);
  }

  if(Math.random()<0.4) enemyAttack();

  if(skillCD>0) skillCD--;

  update();

},800);

// ===== 敵攻撃 =====
function enemyAttack(){
  incoming=true;

  let w=document.createElement("div");
  w.className="warning";
  battle.appendChild(w);

  setTimeout(()=>{
    if(incoming){
      damage(120);
    }
    incoming=false;
    w.remove();
  },700);
}

// ===== 回避 =====
function dodge(){
  if(incoming){
    incoming=false;
    player.combo+=10;
    dmg("JUST!", "blue");
  }else{
    dmg("MISS","gray");
  }
}

// ===== 被弾 =====
function damage(d){
  player.hp-=d;
  player.combo*=0.7;
  dmg(d,"red");

  if(player.hp<=0){
    alert("死亡→転生");
    location.reload();
  }
}

// ===== スキル =====
function skill(){
  if(skillCD>0){
    dmg("CD中","gray");
    return;
  }

  let d=calc()*3;

  if(player.combo>30){
    d*=2;
    dmg("SUPER!", "orange");
  }

  enemyHP-=d;
  skillCD=5;
}

// ===== 経験値 =====
function gainExp(v){
  player.exp+=v;

  let need=player.level*100;

  if(player.exp>=need){
    player.exp-=need;
    player.level++;
    player.atk*=1.2;
    dmg("LEVEL UP!", "green");
  }
}

// ===== UI更新 =====
function update(){
  hp.style.width=(player.hp/player.maxHp*100)+"%";
  boss.style.width=(enemyHP/1000*100)+"%";

  hpText.innerText=Math.floor(player.hp)+"/"+player.maxHp;
  bossText.innerText=Math.floor(enemyHP);

  combo.innerText=Math.floor(player.combo);
  lv.innerText=player.level;

  exp.style.width=(player.exp/(player.level*100)*100)+"%";

  build.innerHTML=`
干支：トラ<br>
ATK：${Math.floor(player.atk)}<br>
倍率：×${(1+player.combo*0.02).toFixed(2)}<br>
スキルCD：${skillCD}
`;
}

update();

</script>
</body>
</html>
